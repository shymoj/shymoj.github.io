<!DOCTYPE html>
<html>
<head>

    <style>
        h1 { text-align: center; }
        p { text-align: center; }
        
        /* Fixed Edge-to-Edge Background */
        body {
            background-image: url("https://images.unsplash.com/photo-1501594907352-04cda38ebc29?q=80&w=2000&auto=format&fit=crop");
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: white;
            overflow-x: hidden;
        }

        /* Flexbox for equal-sized thumbnail boxes (if you use them here) */
        .row {
            display: flex;
            flex-wrap: wrap;
        }
        .thumbnail {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .thumbnail .caption {
            margin-top: auto; 
        }
        .thumbnail img {
            height: 150px;
            width: 100%;
            object-fit: contain; 
            padding-top: 10px;
        }
    </style>
</head>

<body>
    <div id="navbar-placeholder"></div>

        fetch('navbar.html')

        });
    </script>
