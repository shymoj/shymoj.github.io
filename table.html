<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Data Table</title>
    <link rel="stylesheet" href="site.css">
</head>
<body>
    <h1>Data from text.txt</h1>
    
    <table border="1" id="dataTable">
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        // Fetch the text file from the repository
        fetch('text.txt')
            .then(response => response.text())
            .then(data => {
                const tableBody = document.getElementById('tableBody');
                
                // Split the text file by line breaks to get each row
                const rows = data.trim().split('\n');
                
                rows.forEach(rowText => {
                    const tr = document.createElement('tr');
                    
                    // Assuming your text file separates columns with a comma. 
                    // If it uses spaces, change ',' to ' '
                    const columns = rowText.split(','); 
                    
                    columns.forEach(colText => {
                        const td = document.createElement('td');
                        td.textContent = colText.trim();
                        tr.appendChild(td);
                    });
                    
                    tableBody.appendChild(tr);
                });
            })
            .catch(error => {
                console.error('Error loading the text file:', error);
                document.getElementById('tableBody').innerHTML = '<tr><td>Error loading data.</td></tr>';
            });
    </script>
</body>
</html>
